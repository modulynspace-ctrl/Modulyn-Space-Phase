kind = "web"
previewPath = "/"
title = "Modulyn Space"
version = "1.0.0"
id = "artifacts/modulyn-space"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25653

[services.development]
run = "pnpm --filter @workspace/modulyn-space run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modulyn-space", "run", "build" ]
publicDir = "artifacts/modulyn-space/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25653"
BASE_PATH = "/"
